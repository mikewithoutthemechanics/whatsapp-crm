<!-- AUTH MODAL -->
<div id="authModal" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);">
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:#0A0A0F; border:1px solid rgba(255,255,255,0.1); border-radius:24px; padding:40px; width:90%; max-width:420px; box-shadow:0 40px 80px rgba(0,0,0,0.5);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
      <h3 style="color:#fff; font-size:24px; font-weight:700; margin:0;">Sign in to Wavi</h3>
      <button onclick="closeAuthModal()" style="background:none; border:none; color:#8A8A93; font-size:24px; cursor:pointer; padding:0; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">×</button>
    </div>
    <p style="color:#8A8A93; font-size:14px; margin-bottom:24px; line-height:1.6;">Sign in with your Supabase account to access your WhatsApp CRM dashboard.</p>
    <button onclick="signInWithSupabase()" style="width:100%; padding:14px 24px; background:linear-gradient(135deg, #25D366, #128C7E); color:#000; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:12px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 12l10 10 10-10L12 2z"/></svg>
      Continue with Supabase
    </button>
    <p style="color:#8A8A93; font-size:12px; text-align:center; margin-top:20px; line-height:1.5;">Secure authentication powered by Supabase<br/>No account? <a href="/login" style="color:#25D366; text-decoration:none;">Create one free</a></p>
  </div>
</div>

<script>
  function openAuthModal() {
    document.getElementById('authModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }
  function closeAuthModal() {
    document.getElementById('authModal').style.display = 'none';
    document.body.style.overflow = 'auto';
  }
  async function signInWithSupabase() {
    try {
      // Redirect to Supabase OAuth
      const supabaseUrl = window.SUPABSE_URL || 'https://your-project.supabase.co';
      const redirectTo = `${window.location.origin}/auth/callback`;
      window.location.href = `${supabaseUrl}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`;
    } catch (e) {
      console.error('OAuth error:', e);
      alert('Authentication unavailable. Please use /login instead.');
      closeAuthModal();
    }
  }
  // Close modal on backdrop click
  document.getElementById('authModal').addEventListener('click', function(e) {
    if (e.target === this) closeAuthModal();
  });
  // Close on escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeAuthModal();
  });
</script>
